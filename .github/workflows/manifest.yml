name: Aktualizácia manifestu dát

on:
  push:
    paths:
      - "Dáta/**"
      - "scripts/generuj-manifest.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Vygeneruj data-manifest.json
        run: node scripts/generuj-manifest.mjs

      - name: Commitni zmenu manifestu
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-manifest.json
          git diff --cached --quiet || (git commit -m "Automatická aktualizácia manifestu dát" && git push)
